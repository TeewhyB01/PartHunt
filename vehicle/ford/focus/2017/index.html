<!doctype html>

            <svg viewBox="0 0 980 430" role="img" aria-label="Body-type based hatchback model">

              <rect class="part-hotspot" x="438" y="292" width="122" height="48" rx="10"></rect>

    </main>
    <div id="siteFooter"></div><div id="loginPrompt"></div><button id="chatToggle" class="chat-toggle" type="button">Ask</button><section id="chatbox" class="chatbox hidden"></section><script type="module" src="/site.js"></script>
